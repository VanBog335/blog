<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <title>
        {% if page.title %}
            {{ page.title }}
        {% else %} 
            {{ site.name }}
        {% endif %}
    </title>
    
    <meta name='viewport' content='width=device-width, initial-scale=1'>

</head>

<body bgcolor=#404040 text=white vlink=#ff8000 link=gold>
    {% include header.html %}

    {{ content }}
<hr>
    <p><small> <i>Основанно на <a href="https://jekyllrb.com/">Jekyll</a> и  <a href="https://github.com/cyevgeniy/jekyll-true-minimal/">минималистичной темы</a></i> </small></p>
</body>
</html>
